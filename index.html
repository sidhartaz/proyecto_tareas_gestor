<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
        <img src="assets/img/Sin título.png" alt="Logo" class="logo-img">
        <h1>Flujo de Tarea</h1>
        </div>
        <nav>
            <a href="#agregar">Nueva Tarea</a>
            <a href="#tablero">Tablero</a>
            <a href="#contacto">Contacto</a>
        </nav>
    </header>

    <!-- MAIN -->
    <main>

        <!-- FORMULARIO -->
        <section id="agregar">
            <h2>Agregar Nueva Tarea</h2>

            <form id="nuevaTareaFormulario" onsubmit="agregarNuevaTarea(event)">

                <label for="descripcion">Descripción:</label>
                <textarea id="descripcion" required></textarea>

                <label for="prioridad">Prioridad:</label>
                <select id="prioridad" required>
                    <option value="">Seleccionar...</option>
                    <option value="alta">Alta</option>
                    <option value="media">Media</option>
                    <option value="baja">Baja</option>
                </select>

                <label for="fecha">Fecha límite:</label>
                <input type="date" id="fecha" required>

                <button type="submit">Agregar Tarea</button>

            </form>
        </section>

        <!-- TABLERO KANBAN -->
        <section id="tablero">
            <h></h>
            <h></h>
            <h2>Tablero de Tareas</h2>

            <div class="kanban">

                <div class="columna" id="pendientes">
                    <h3>Pendientes <span class="contador">0</span></h3>
                    <div class="tareas-container" id="todoContainer"></div>
                </div>

                <div class="columna" id="en-progreso">
                    <h3>En Progreso <span class="contador">0</span></h3>
                    <div class="tareas-container" id="doingContainer"></div>
                </div>

                <div class="columna" id="completadas">
                    <h3>Completadas <span class="contador">0</span></h3>
                    <div class="tareas-container" id="doneContainer"></div>
                </div>

            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer id="contacto">
        <p>Carlos Sepúlveda</strong></p>
        <p>csepulveda2025@alu.uct.cl</p>
    </footer>

    <script src="assets/js/script.js"></script>

</body>
</html>
